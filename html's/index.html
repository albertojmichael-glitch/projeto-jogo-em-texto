<style>
  body {
  background-color: lightyellow;
  text-align: center;
  font-family: 'times', serif;
  }
  
  h1 {
    color: red;
    font-size: 40px;
  }

  p {
    color: green;
    font-size: 30px;
  }

  button {
    color: white;
    background-color: brown;
    font-size: 40px;

    padding: 15px 40px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: red;
    transform: scale(1.05);
  }

  #btn-modo-escuro {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    font-size: 40px;
    cursor: pointer;
  }

  input {
  display: block;
  margin: 0 auto 15px auto;
  padding: 10px;
  font-size: 18px;
  border-radius: 8px;
  border: 2px solid #ccc;
  width: 250px;
}
  
</style>

<button id="btn-modo-escuro" onclick="modoEscuro()">🌙</button>

<h1 id="green-green-grass-of-home">Solo para Invitados</h1>

<div id="area-login">
  <h2> Faça seu Login</h2>

  <p>Nome de Usuário:</p>
  <input type="text" id="campo-nome" placeholder="Digite seu Nome">

  <p>Senha:</p>
  <input type="password" id="campo-senha" placeholder="Digite sua Senha">

  <br>
  <button onclick="entrar()">Entrar</button>

</div>


<script>
  function trocarpalavra() {
    document.getElementById("green-green-grass-of-home").innerHTML = "verde verde   grama da casa";
  }
  
  function modoEscuro() {
  document.body.style.backgroundColor = "#222222";

  document.getElementById("green-green-grass-of-home").style.color = "white";

</script>
