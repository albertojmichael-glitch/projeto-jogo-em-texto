<style>
  body {
  background-color: lightyellow;
  text-align: center;
  font-family: 'times', serif;
  }
  
  h1 {
    color: red;
    font-size: 40px;
  }

  p {
    color: green;
    font-size: 30px;
  }

  button {
    color: white;
    background-color: brown;
    font-size: 40px;

    padding: 15px 40px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: red;
    transform: scale(1.05);
  }

  #btn-modo-escuro {
    position: absolute;
    top: 2px;
    right: 2px;
    background: none;
    border: none;
    font-size: 25px;
    cursor: pointer;
  }

  input {
  display: block;
  margin: 0 auto 15px auto;
  padding: 10px;
  font-size: 18px;
  border-radius: 8px;
  border: 2px solid #ccc;
  width: 250px;
  }

  #caixa-aviso {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
    z-index: 1000;
    text-align: center;
  }

  #caixa-aviso p {
    color: black;
    font-size: 22px;
  }
  
</style>

<button id="btn-modo-escuro" onclick="modoEscuro()">🌙</button>

<h1 id="green-green-grass-of-home">Solo para Invitados</h1>

<div id="area-login">
  <h2 id="titulo-login">Faça seu login</h2>
  
  <p id="usuario-nome">Nome de Usuário:</p>
  <input type="text" id="campo-nome" placeholder="Digite seu nome">
  
  <p>Senha:</p>
  <input type="password" id="campo-senha" placeholder="Sua senha">
  
  <br>
  <button onclick="entrar()">Entrar</button>

  <p><a href="#" onclick="mostrarCadastro()" style="color: green;">Não tem conta? Cadastre-se</a></p>
</div>

<div id="area-cadastro" style="display: none;">
  <h2 id="titulo-cadastro">Crie sua conta</h2>
  <p>Escolha um Nome de Usuário:</p>
  <input type="text" id="novo-nome" placeholder="Crie um nome">
  <p>Escolha uma Senha:</p>
  <input type="password" id="nova-senha" placeholder="Crie uma senha">
  <br>
  <button onclick="cadastrar()">Cadastrar</button>

  <p><a href="#" onclick="mostrarLogin()" style="color: green;">Já tem conta? Faça login</a></p>
  </div>

  <div id="caixa-aviso" style="display: none;">
    <p id="texto-aviso">mensagem</p>
    <button onclick="fecharAviso()">OK</button>
  </div>

<script>
  function trocarpalavra() {
    document.getElementById("green-green-grass-of-home").innerHTML = "verde verde   grama da casa";
  }
  
  function modoEscuro() {
  document.body.style.backgroundColor = "#222222";

  document.getElementById("green-green-grass-of-home").style.color = "white";

  document.getElementById("titulo-login").style.color = "white";
  document.getElementById("titulo-cadastro").style.color = "white";

  document.getElementById("usuario-nome").style.color = "white";
  document.getElementById("mister-senha").style.color = "white";

  }

  function entrar() {

    let nomeDigitado = document.getElementById("campo-nome").value;
    let senhaDigitada = document.getElementById("campo-senha").value;

    let nomeSalvo = localStorage.getItem("nomeSalvo");
    let senhaSalva = localStorage.getItem("senhaSalva");

    if (nomeDigitado === nomeSalvo && senhaDigitada === senhaSalva) {

      alert("Bem vindo de volta, " + nomeDigitado + "!");
    
    } else {
      alert("nome ou senha incorretos, verifique seus dados ou cadastre-se.");
    }
  }

  function mostrarCadastro() {
  document.getElementById("area-login").style.display = "none";
  document.getElementById("area-cadastro").style.display = "block";

}

function mostrarLogin() {
  document.getElementById("area-cadastro").style.display= "none";
  document.getElementById("area-login").style.display = "block";

}

function cadastrar() {
  let nomeCriado = document.getElementById("novo-nome").value;
  let senhaCriada = document.getElementById("nova-senha").value;

  localStorage.setItem("nomeSalvo", nomeCriado);
  localStorage.setItem("senhaSalva", senhaCriada);

  alert("Conta criada! Volte para o login.");
  mostrarLogin();

}

  function mostrarAviso(mensagem) {
  document.getElementById("texto-aviso").innerHTML = mensagem;
  document.getElementById("caixa-aviso").style.display = "block";

}

function fecharAviso() {
  document.getElementById("caixa-aviso").style.display = "none";
  
}
  
</script>
